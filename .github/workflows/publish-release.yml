name: Publish Release

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        type: choice
        options:
          - next
        default: next

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish_stable:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      (
        github.event.pull_request.head.ref == 'changeset-release/main' ||
        github.event.pull_request.title == 'chore(release): version packages'
      )
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm release:build

      - name: Publish packages to npm
        run: pnpm release:publish:stable

      - name: Resolve release version
        id: release_version
        run: node tools/release/read-release-version.mjs --github-output

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release_version.outputs.tag }}" "${{ github.event.pull_request.merge_commit_sha }}" -m "${{ steps.release_version.outputs.tag }}"
          git push origin "${{ steps.release_version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_version.outputs.tag }}" \
            --verify-tag \
            --title "${{ steps.release_version.outputs.tag }}" \
            --generate-notes

  publish_next:
    # npm trusted publishing allows one trusted publisher config per package, so
    # stable and next both route through this workflow file.
    if: |
      github.event_name == 'workflow_dispatch' &&
      inputs.channel == 'next'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: release-control

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require main branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Next publish must run from main. Got ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive prerelease version
        run: pnpm release:version:prerelease

      - name: Build publishable packages
        run: pnpm release:build

      - name: Publish packages to npm with next tag
        run: pnpm release:publish:next
